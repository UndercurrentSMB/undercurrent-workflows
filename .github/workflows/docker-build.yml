# docker-build.yml — Reusable Docker Build & Push to ECR
#
# Builds an arm64 image, pushes to ECR tagged with the git SHA.
# Both clusters (dev MacBook M3, prod Mac Mini) are Apple Silicon —
# no amd64 consumers. Uses GHA cache for Docker layer reuse.
# Extracted from deploy.yml Phase 1 CI/CD restructure.

name: Docker Build & Push

on:
  workflow_call:
    inputs:
      service_name:
        description: "ECR repo name"
        required: true
        type: string
      has_auth_dep:
        description: "Clone auth-go for replace directive"
        required: false
        type: boolean
        default: false
      has_rabbit_dep:
        description: "Clone shared-go-rabbit for replace directive"
        required: false
        type: boolean
        default: false
      tag_latest:
        description: "Also tag as :latest"
        required: false
        type: boolean
        default: false
    outputs:
      image_tag:
        description: "Git SHA used as image tag"
        value: ${{ jobs.build.outputs.image_tag }}
      image_ref:
        description: "Full ECR image URI"
        value: ${{ jobs.build.outputs.image_ref }}

permissions:
  id-token: write
  contents: read

jobs:
  build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App token
        if: inputs.has_auth_dep || inputs.has_rabbit_dep
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Respondyr
          repositories: auth-go,shared-go-rabbit

      - name: Clone and stage auth-go for Docker build
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Respondyr/auth-go.git \
            /tmp/auth-go
          mkdir -p .deps
          cp -r /tmp/auth-go .deps/auth-go

      - name: Clone and stage shared-go-rabbit for Docker build
        if: inputs.has_rabbit_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Respondyr/shared-go-rabbit.git \
            /tmp/shared-go-rabbit
          mkdir -p .deps
          cp -r /tmp/shared-go-rabbit .deps/shared-go-rabbit

      - name: Compute image metadata
        id: meta
        run: |
          echo "image_ref=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-2' }}.amazonaws.com/${{ inputs.service_name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - name: Compute image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${{ steps.meta.outputs.image_ref }}"
            if [ "${{ inputs.tag_latest }}" = "true" ]; then
              echo "${{ steps.ecr-login.outputs.registry }}/${{ inputs.service_name }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
