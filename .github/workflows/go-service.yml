name: Go Service CI

on:
  workflow_call:
    inputs:
      dev_mode:
        description: "Skip security scans, Docker on PRs, and use single-arch builds to save CI minutes"
        required: false
        type: boolean
        default: false
      service_name:
        description: "Service name (e.g. undercurrent-accounts)"
        required: true
        type: string
      go_version:
        description: "Go version"
        required: false
        type: string
        default: "1.25"
      has_docker:
        description: "Build and push Docker image on main push"
        required: false
        type: boolean
        default: true
      has_migrations:
        description: "Service has db/migrations directory"
        required: false
        type: boolean
        default: true
      has_auth_dep:
        description: "Clone undercurrent-auth-go for replace directive"
        required: false
        type: boolean
        default: false
      build_target:
        description: "Go build target (e.g. ./cmd/server, ./...)"
        required: false
        type: string
        default: "./cmd/server"
      argocd_enabled:
        description: "Update image tag in helm/values.yaml after build for ArgoCD"
        required: false
        type: boolean
        default: false
    outputs:
      image_tag:
        description: "Docker image tag (git SHA)"
        value: ${{ jobs.docker.outputs.image_tag }}
      image_ref:
        description: "Full ECR image reference"
        value: ${{ jobs.docker.outputs.image_ref }}

permissions:
  id-token: write
  contents: read
  pull-requests: read
  security-events: write

jobs:
  security:
    if: ${{ !inputs.dev_mode }}
    uses: UndercurrentSMB/undercurrent-workflows/.github/workflows/security.yml@v0
    with:
      language: go
      go_version: ${{ inputs.go_version }}
      has_auth_dep: ${{ inputs.has_auth_dep }}
    secrets: inherit

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        if: inputs.has_auth_dep
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: UndercurrentSMB
          repositories: undercurrent-auth-go

      - name: Clone auth-go for replace directive
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/UndercurrentSMB/undercurrent-auth-go.git \
            ${{ github.workspace }}/../undercurrent-auth-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /dev/null ${{ inputs.build_target }}

  docker:
    name: Docker Build & Push
    if: ${{ always() && !failure() && !cancelled() && inputs.has_docker && !(inputs.dev_mode && github.event_name == 'pull_request' && !inputs.argocd_enabled) }}
    needs: [test, security]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        if: inputs.has_auth_dep
        id: app-token-docker
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: UndercurrentSMB
          repositories: undercurrent-auth-go

      - name: Clone and stage auth-go for Docker build
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token-docker.outputs.token }}@github.com/UndercurrentSMB/undercurrent-auth-go.git \
            /tmp/undercurrent-auth-go
          mkdir -p .deps
          cp -r /tmp/undercurrent-auth-go .deps/undercurrent-auth-go

      - name: Compute image metadata
        id: meta
        run: |
          echo "image_ref=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-2' }}.amazonaws.com/${{ inputs.service_name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        if: ${{ !inputs.dev_mode }}
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.dev_mode && 'linux/arm64' || 'linux/amd64,linux/arm64' }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('{0}/{1}:latest', steps.ecr-login.outputs.registry, inputs.service_name) || '' }}

  image-scan:
    name: Image Security Scan
    if: ${{ inputs.has_docker && !inputs.dev_mode }}
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.docker.outputs.image_ref }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

  update-image-tag:
    name: Update Image Tag
    if: ${{ inputs.argocd_enabled && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.docker.result == 'success' }}
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        uses: mikefarah/yq@master

      - name: Update image tag in values.yaml
        run: |
          yq -i '.["base-service"].deployment.image.tag = "${{ github.sha }}"' helm/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push

  validate-dev-deployment:
    name: Validate Dev Deployment
    if: ${{ inputs.argocd_enabled && github.event_name == 'pull_request' && needs.docker.result == 'success' }}
    needs: [docker]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ARGOCD_SERVER: argocd-dev.undercurrentsmb.com
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch ArgoCD token from Secrets Manager
        run: |
          ARGOCD_AUTH_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id dev/undercurrentsmb/master-list \
            --query 'SecretString' --output text \
            --region ${{ vars.AWS_REGION }} | jq -r '.["ARGOCD-DEV-TOKEN"]')
          echo "::add-mask::$ARGOCD_AUTH_TOKEN"
          echo "ARGOCD_AUTH_TOKEN=$ARGOCD_AUTH_TOKEN" >> "$GITHUB_ENV"

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd
          sudo mv argocd /usr/local/bin/

      - name: Deploy PR image to dev
        run: |
          APP="${{ inputs.service_name }}"
          TAG="${{ github.sha }}"
          echo "Setting $APP image tag to $TAG"
          argocd app set "$APP" -p "base-service.deployment.image.tag=$TAG" --grpc-web --insecure

      - name: Sync and wait for rollout
        run: |
          APP="${{ inputs.service_name }}"
          argocd app sync "$APP" --grpc-web --insecure --prune
          argocd app wait "$APP" --health --sync --timeout 300 --grpc-web --insecure

      - name: Verify deployed image tag
        run: |
          APP="${{ inputs.service_name }}"
          TAG="${{ github.sha }}"
          RETRIES=0
          MAX_RETRIES=18
          while [ $RETRIES -lt $MAX_RETRIES ]; do
            IMAGES=$(argocd app get "$APP" -o json --grpc-web --insecure | jq -r '.status.summary.images[]? // empty')
            if echo "$IMAGES" | grep -q "$TAG"; then
              echo "Deployed image matches expected tag: $TAG"
              exit 0
            fi
            RETRIES=$((RETRIES + 1))
            echo "Waiting for image rollout ($RETRIES/$MAX_RETRIES)..."
            sleep 10
          done
          echo "::error::Deployed image does not match expected tag $TAG"
          echo "Live images: $IMAGES"
          exit 1

      - name: Verify app health
        run: |
          APP="${{ inputs.service_name }}"
          HEALTH=$(argocd app get "$APP" -o json --grpc-web --insecure | jq -r '.status.health.status')
          if [ "$HEALTH" != "Healthy" ]; then
            echo "::error::App health is $HEALTH — blocking merge"
            argocd app get "$APP" --grpc-web --insecure
            exit 1
          fi
          echo "Dev deployment validated — safe to merge to prod"

      - name: Cleanup parameter override
        if: always()
        run: |
          argocd app unset "${{ inputs.service_name }}" -p base-service.deployment.image.tag --grpc-web --insecure 2>/dev/null || true
          argocd app sync "${{ inputs.service_name }}" --grpc-web --insecure 2>/dev/null || true
