name: Go Service CI

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (e.g. undercurrent-accounts)"
        required: true
        type: string
      go_version:
        description: "Go version"
        required: false
        type: string
        default: "1.25"
      has_docker:
        description: "Build and push Docker image on main push"
        required: false
        type: boolean
        default: true
      has_migrations:
        description: "Service has db/migrations directory"
        required: false
        type: boolean
        default: true
      has_auth_dep:
        description: "Clone undercurrent-auth-go for replace directive"
        required: false
        type: boolean
        default: false
      build_target:
        description: "Go build target (e.g. ./cmd/server, ./...)"
        required: false
        type: string
        default: "./cmd/server"
    outputs:
      image_tag:
        description: "Docker image tag (git SHA)"
        value: ${{ jobs.docker.outputs.image_tag }}
      image_ref:
        description: "Full ECR image reference"
        value: ${{ jobs.docker.outputs.image_ref }}

permissions:
  id-token: write
  contents: read
  pull-requests: read
  security-events: write

jobs:
  security:
    uses: Travbz/undercurrent-workflows/.github/workflows/security.yml@v0
    with:
      language: go
      go_version: ${{ inputs.go_version }}
      has_auth_dep: ${{ inputs.has_auth_dep }}
    secrets: inherit

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        if: inputs.has_auth_dep
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Travbz
          repositories: undercurrent-auth-go

      - name: Clone auth-go for replace directive
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Travbz/undercurrent-auth-go.git \
            ${{ github.workspace }}/../undercurrent-auth-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /dev/null ${{ inputs.build_target }}

  docker:
    name: Docker Build & Push
    if: inputs.has_docker
    needs: [test, security]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        if: inputs.has_auth_dep
        id: app-token-docker
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Travbz
          repositories: undercurrent-auth-go

      - name: Clone and stage auth-go for Docker build
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token-docker.outputs.token }}@github.com/Travbz/undercurrent-auth-go.git \
            /tmp/undercurrent-auth-go
          mkdir -p .deps
          cp -r /tmp/undercurrent-auth-go .deps/undercurrent-auth-go

      - name: Compute image metadata
        id: meta
        run: |
          echo "image_ref=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-2' }}.amazonaws.com/${{ inputs.service_name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('{0}/{1}:latest', steps.ecr-login.outputs.registry, inputs.service_name) || '' }}

  image-scan:
    name: Image Security Scan
    if: inputs.has_docker
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.docker.outputs.image_ref }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
