name: Go Service CI

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (e.g. undercurrent-accounts)"
        required: true
        type: string
      go_version:
        description: "Go version"
        required: false
        type: string
        default: "1.25"
      has_docker:
        description: "Build and push Docker image on main push"
        required: false
        type: boolean
        default: true
      has_migrations:
        description: "Service has db/migrations directory"
        required: false
        type: boolean
        default: true
      has_auth_dep:
        description: "Clone undercurrent-auth-go for replace directive"
        required: false
        type: boolean
        default: false
      build_target:
        description: "Go build target (e.g. ./cmd/server, ./...)"
        required: false
        type: string
        default: "./cmd/server"
    outputs:
      image_tag:
        description: "Docker image tag (git SHA)"
        value: ${{ jobs.docker.outputs.image_tag }}

permissions:
  contents: read
  security-events: write

jobs:
  security:
    uses: Travbz/undercurrent-workflows/.github/workflows/security.yml@v0
    with:
      language: go
      go_version: ${{ inputs.go_version }}
    secrets: inherit

  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Clone auth-go for replace directive
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://github.com/Travbz/undercurrent-auth-go.git \
            ${{ github.workspace }}/../undercurrent-auth-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /dev/null ${{ inputs.build_target }}

  docker:
    name: Docker Build & Push
    if: inputs.has_docker && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [test, security]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone and stage auth-go for Docker build
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://github.com/Travbz/undercurrent-auth-go.git \
            /tmp/undercurrent-auth-go
          mkdir -p .deps
          cp -r /tmp/undercurrent-auth-go .deps/undercurrent-auth-go

      - name: Compute image metadata
        id: meta
        run: |
          echo "image_ref=${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ inputs.service_name }}:latest

  image-scan:
    name: Image Security Scan
    if: inputs.has_docker && github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker
    uses: Travbz/undercurrent-workflows/.github/workflows/security.yml@v0
    with:
      language: go
      image_ref: ${{ needs.docker.outputs.image_ref }}
    secrets: inherit
