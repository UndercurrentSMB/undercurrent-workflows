# python-ci.yml — PR-only Python CI
#
# Runs: uv pip install → ruff check → pytest
# No Docker. No deploy. Fast feedback on PRs.

name: Python CI

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      install_method:
        description: "pip (requirements.txt) or editable (pyproject.toml)"
        required: false
        type: string
        default: "pip"
      src_path:
        description: "Source path for linting"
        required: false
        type: string
        default: "src/"
      has_tests:
        description: "Run pytest"
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Secret scan (gitleaks)
        # Catches accidentally-committed credentials (.env, keys, tokens).
        # Falls back to gitleaks' built-in ruleset if the calling repo has no
        # .gitleaks.toml. P0.3 Sub-track 4.3 — prevention against
        # re-introducing the secrets we already rotated.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies (pip)
        if: inputs.install_method == 'pip'
        run: |
          uv pip install --system -r requirements.txt
          uv pip install --system ruff pytest 2>/dev/null || true

      - name: Configure git for private deps
        if: inputs.install_method == 'editable'
        run: git config --global url."https://x-access-token:${{ github.token }}@github.com/".insteadOf "https://github.com/"

      - name: Install dependencies (editable)
        if: inputs.install_method == 'editable'
        run: |
          uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check ${{ inputs.src_path }}
        continue-on-error: true

      - name: Test
        if: inputs.has_tests
        run: pytest tests/ -v --tb=short
