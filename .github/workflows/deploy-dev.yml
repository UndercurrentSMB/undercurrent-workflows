# deploy-dev.yml — Reusable Deploy to Dev via ArgoCD API
#
# Sets image tag, syncs with retries + backoff, waits for health.
# Global concurrency lock — ArgoCD dev can't handle concurrent syncs.
# Extracted from deploy.yml Phase 1 CI/CD restructure.

name: Deploy to Dev

on:
  workflow_call:
    inputs:
      service_name:
        description: "ArgoCD app name"
        required: true
        type: string
      image_tag:
        description: "Image tag to deploy (git SHA)"
        required: true
        type: string

permissions:
  id-token: write

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: argocd-dev
      cancel-in-progress: false
    env:
      ARGOCD_SERVER: argocd-dev.respondyr.com
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch ArgoCD token and CF Access headers
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id dev/platform/master-list \
            --query 'SecretString' --output text \
            --region ${{ vars.AWS_REGION }})
          ARGOCD_AUTH_TOKEN=$(echo "$SECRET" | jq -r '.["ARGOCD-DEV-TOKEN"]')
          CF_CLIENT_ID=$(echo "$SECRET" | jq -r '.["CF-ACCESS-CLIENT-ID"]')
          CF_CLIENT_SECRET=$(echo "$SECRET" | jq -r '.["CF-ACCESS-CLIENT-SECRET"]')
          echo "::add-mask::$ARGOCD_AUTH_TOKEN"
          echo "::add-mask::$CF_CLIENT_ID"
          echo "::add-mask::$CF_CLIENT_SECRET"
          {
            echo "ARGOCD_AUTH_TOKEN=$ARGOCD_AUTH_TOKEN"
            # CF Access service-token headers — attached to every REST call
            # to bypass the non_identity policy on argocd-dev.respondyr.com.
            echo "CF_CLIENT_ID=$CF_CLIENT_ID"
            echo "CF_CLIENT_SECRET=$CF_CLIENT_SECRET"
          } >> "$GITHUB_ENV"

      - name: Set image tag, sync, and verify (REST)
        env:
          SVC: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          # REST-over-curl instead of `argocd` CLI + grpc-web: the cloudflared
          # tunnel on the Mini consistently EOFs grpc-web streams, but plain
          # HTTP/1.1 works. Short-lived requests, no long streams, no CLI.
          set -euo pipefail
          BASE="https://${ARGOCD_SERVER}/api/v1"

          call() {
            local method="$1" path="$2" body="${3-}" resp code data attempt
            for attempt in 1 2 3 4 5; do
              if [ -n "$body" ]; then
                resp=$(curl -sS --http1.1 --max-time 30 -w '\n%{http_code}' -X "$method" \
                  -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
                  -H "CF-Access-Client-Id: ${CF_CLIENT_ID}" \
                  -H "CF-Access-Client-Secret: ${CF_CLIENT_SECRET}" \
                  -H "Content-Type: application/json" \
                  --data "$body" "${BASE}${path}") || { echo "attempt $attempt: curl error" >&2; sleep $((attempt*5)); continue; }
              else
                resp=$(curl -sS --http1.1 --max-time 30 -w '\n%{http_code}' -X "$method" \
                  -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
                  -H "CF-Access-Client-Id: ${CF_CLIENT_ID}" \
                  -H "CF-Access-Client-Secret: ${CF_CLIENT_SECRET}" \
                  "${BASE}${path}") || { echo "attempt $attempt: curl error" >&2; sleep $((attempt*5)); continue; }
              fi
              code=$(printf '%s' "$resp" | tail -n1)
              data=$(printf '%s' "$resp" | sed '$d')
              if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
                printf '%s' "$data"
                return 0
              fi
              echo "attempt $attempt: HTTP $code" >&2
              [ "$attempt" -eq 5 ] || sleep $((attempt*5))
            done
            echo "::error::$method $path failed after 5 attempts" >&2
            return 1
          }

          echo "→ fetch current app spec"
          APP=$(call GET "/applications/${SVC}")

          echo "→ build updated spec with image tag ${IMAGE_TAG}"
          NEW_SPEC=$(printf '%s' "$APP" | jq --arg tag "$IMAGE_TAG" '
            .spec
            | .source.helm.parameters = (
                (.source.helm.parameters // [])
                | map(select(.name != "base-service.deployment.image.tag"))
                + [{name: "base-service.deployment.image.tag", value: $tag}]
              )
          ')

          echo "→ PUT updated spec"
          call PUT "/applications/${SVC}/spec?validate=true" "$NEW_SPEC" >/dev/null

          echo "→ trigger sync"
          SYNC_RESP=$(curl -sS --http1.1 --max-time 30 -w '\n%{http_code}' -X POST \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "CF-Access-Client-Id: ${CF_CLIENT_ID}" \
            -H "CF-Access-Client-Secret: ${CF_CLIENT_SECRET}" \
            -H "Content-Type: application/json" \
            --data '{"prune":true}' "${BASE}/applications/${SVC}/sync" || true)
          SYNC_CODE=$(printf '%s' "$SYNC_RESP" | tail -n1)
          SYNC_DATA=$(printf '%s' "$SYNC_RESP" | sed '$d')
          if [ "${SYNC_CODE:-0}" -ge 200 ] && [ "${SYNC_CODE:-0}" -lt 300 ]; then
            echo "sync triggered"
          elif printf '%s' "$SYNC_DATA" | grep -qi "another operation is already in progress"; then
            echo "sync already in progress — proceeding to wait"
          else
            echo "::error::sync failed: HTTP ${SYNC_CODE:-?} ${SYNC_DATA}"
            exit 1
          fi

          echo "→ poll for Healthy + Synced (300s timeout)"
          deadline=$(( $(date +%s) + 300 ))
          while [ "$(date +%s)" -lt "$deadline" ]; do
            STATUS=$(call GET "/applications/${SVC}" || echo '{}')
            HEALTH=$(printf '%s' "$STATUS" | jq -r '.status.health.status // "Unknown"')
            SYNC=$(printf '%s' "$STATUS" | jq -r '.status.sync.status // "Unknown"')
            OPERATION=$(printf '%s' "$STATUS" | jq -r '.status.operationState.phase // ""')
            echo "  health=${HEALTH} sync=${SYNC} op=${OPERATION}"
            if [ "$HEALTH" = "Healthy" ] && [ "$SYNC" = "Synced" ] && { [ -z "$OPERATION" ] || [ "$OPERATION" = "Succeeded" ]; }; then
              echo "dev deploy healthy and synced"
              exit 0
            fi
            if [ "$OPERATION" = "Failed" ] || [ "$OPERATION" = "Error" ]; then
              echo "::error::sync operation $OPERATION"
              printf '%s' "$STATUS" | jq '.status.operationState.message // empty'
              exit 1
            fi
            sleep 10
          done
          echo "::error::deploy did not reach Healthy+Synced within 300s"
          exit 1
