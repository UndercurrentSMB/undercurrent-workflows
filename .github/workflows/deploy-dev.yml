# deploy-dev.yml — Reusable Deploy to Dev via ArgoCD API
#
# Sets image tag, syncs with retries + backoff, waits for health.
# Global concurrency lock — ArgoCD dev can't handle concurrent syncs.
# Extracted from deploy.yml Phase 1 CI/CD restructure.

name: Deploy to Dev

on:
  workflow_call:
    inputs:
      service_name:
        description: "ArgoCD app name"
        required: true
        type: string
      image_tag:
        description: "Image tag to deploy (git SHA)"
        required: true
        type: string

permissions:
  id-token: write

jobs:
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: argocd-dev
      cancel-in-progress: false
    env:
      ARGOCD_SERVER: argocd-dev.respondyr.com
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch ArgoCD token
        run: |
          ARGOCD_AUTH_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id dev/platform/master-list \
            --query 'SecretString' --output text \
            --region ${{ vars.AWS_REGION }} | jq -r '.["ARGOCD-DEV-TOKEN"]')
          echo "::add-mask::$ARGOCD_AUTH_TOKEN"
          echo "ARGOCD_AUTH_TOKEN=$ARGOCD_AUTH_TOKEN" >> "$GITHUB_ENV"

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd && sudo mv argocd /usr/local/bin/

      - name: Set image tag and sync
        run: |
          argocd app set "${{ inputs.service_name }}" \
            -p "base-service.deployment.image.tag=${{ inputs.image_tag }}" \
            --grpc-web --insecure

          # Retry sync up to 5 times with backoff to handle "another operation in progress"
          for attempt in 1 2 3 4 5; do
            if argocd app sync "${{ inputs.service_name }}" --grpc-web --insecure --prune 2>&1; then
              echo "Sync started on attempt $attempt"
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "::error::Sync failed after 5 attempts"
              exit 1
            fi
            BACKOFF=$((attempt * 10))
            echo "Sync attempt $attempt failed, retrying in ${BACKOFF}s..."
            sleep "$BACKOFF"
          done

          argocd app wait "${{ inputs.service_name }}" --health --sync --timeout 300 --grpc-web --insecure

      - name: Verify deployment health
        run: |
          HEALTH=$(argocd app get "${{ inputs.service_name }}" -o json --grpc-web --insecure | jq -r '.status.health.status')
          if [ "$HEALTH" != "Healthy" ]; then
            echo "::error::Dev deployment unhealthy: $HEALTH"
            argocd app get "${{ inputs.service_name }}" --grpc-web --insecure
            exit 1
          fi
          echo "Dev deployment healthy"
