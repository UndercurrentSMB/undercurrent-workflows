# semver-release.yml — Reusable Semantic Release + ECR Retag
#
# Analyzes conventional commits since the last semver tag, bumps
# major/minor/patch, creates a GitHub Release with changelog, then
# retags the existing ECR image from :sha to :vX.Y.Z (no rebuild).
# Extracted from deploy.yml Phase 1 CI/CD restructure.

name: Semantic Release

on:
  workflow_call:
    inputs:
      service_name:
        description: "ECR repo name for retagging"
        required: true
        type: string
      has_docker:
        description: "Whether to retag ECR image"
        required: false
        type: boolean
        default: true
    outputs:
      tag:
        description: "New semver tag"
        value: ${{ jobs.release.outputs.tag }}
      skip:
        description: "Whether release was skipped"
        value: ${{ jobs.release.outputs.skip }}

permissions:
  id-token: write
  contents: write

jobs:
  # ──────────────────────────────────────────────
  # RELEASE — conventional commit → semver → GitHub Release
  # ──────────────────────────────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
            LAST_TAG="v0.0.0"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null)
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_BREAKING=$(echo "$COMMITS" | grep -cE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE" || true)
          HAS_FEAT=$(echo "$COMMITS" | grep -cE "^feat" || true)
          HAS_PATCH=$(echo "$COMMITS" | grep -cE "^(fix|refactor|perf|chore|ci|build|test)" || true)

          if [ "$HAS_BREAKING" -gt 0 ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$HAS_FEAT" -gt 0 ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$HAS_PATCH" -gt 0 ]; then
            PATCH=$((PATCH + 1))
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Bumping to v${MAJOR}.${MINOR}.${PATCH}"

      - name: Generate changelog
        if: steps.bump.outputs.skip == 'false'
        id: changelog
        run: |
          RANGE="${{ steps.bump.outputs.range }}"
          {
            echo 'body<<CHANGELOG_EOF'

            FEATS=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^feat" | sed 's/^feat[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$FEATS" ]; then
              echo "## Features"
              echo "$FEATS"
              echo ""
            fi

            FIXES=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^fix" | sed 's/^fix[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$FIXES" ]; then
              echo "## Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            OTHER=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^(refactor|perf|chore|ci|build|test)" | sed 's/^[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$OTHER" ]; then
              echo "## Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.bump.outputs.skip == 'false'
        run: |
          cat <<'NOTES_EOF' > /tmp/release-notes.md
          ${{ steps.changelog.outputs.body }}
          NOTES_EOF
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes-file /tmp/release-notes.md \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # RETAG — same image, new tag (:sha → :vX.Y.Z)
  #   No rebuild. Just an ECR manifest copy.
  # ──────────────────────────────────────────────
  retag:
    name: Retag Image
    needs: release
    if: ${{ inputs.has_docker && needs.release.outputs.skip == 'false' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag image with semver
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          SHA="${{ github.sha }}"

          echo "Retagging $SHA → $TAG"

          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ inputs.service_name }}" \
            --image-ids imageTag="$SHA" \
            --query 'images[0].imageManifest' \
            --output text \
            --region ${{ vars.AWS_REGION }})

          if [ "$MANIFEST" = "None" ] || [ -z "$MANIFEST" ]; then
            echo "::error::Image $SHA not found in ECR"
            exit 1
          fi

          aws ecr put-image \
            --repository-name "${{ inputs.service_name }}" \
            --image-tag "$TAG" \
            --image-manifest "$MANIFEST" \
            --region ${{ vars.AWS_REGION }} || echo "Tag may already exist"

          echo "Tagged $TAG"
