name: Frontend CI

on:
  workflow_call:
    inputs:
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      build_command:
        description: "Build command"
        required: false
        type: string
        default: "npm run build"
      build_env:
        description: "JSON object of env vars for build step"
        required: false
        type: string
        default: "{}"

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  security:
    uses: Travbz/undercurrent-workflows/.github/workflows/security.yml@v0
    with:
      language: node
      node_version: ${{ inputs.node_version }}
    secrets: inherit

  build:
    name: Install & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint 2>/dev/null || true

      - name: Build
        run: ${{ inputs.build_command }}
        env: ${{ fromJSON(inputs.build_env) }}
