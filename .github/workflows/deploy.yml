# deploy.yml — Unified main-merge pipeline
#
# Flow: test → build → deploy-dev → verify → release → retag → deploy-prod
#
# Convention over configuration:
#   - Go:     go vet ./... → go test ./... → go build
#   - Python: ruff check → pytest tests/
#   - Node:   npm test → npm run build
#
# One image, built once, tested in dev, promoted to prod.
# No bot commits to main. No double builds. Same flow for all languages.

name: Deploy

on:
  workflow_call:
    inputs:
      language:
        description: "go | python | node"
        required: true
        type: string
      service_name:
        description: "Service name — used as ECR repo name and ArgoCD app name"
        required: true
        type: string
      has_docker:
        description: "Build and push Docker image"
        required: false
        type: boolean
        default: true
      argocd_enabled:
        description: "Deploy via ArgoCD API (requires valid token in Secrets Manager)"
        required: false
        type: boolean
        default: true
      has_e2e:
        description: "Run e2e tests against dev after deployment"
        required: false
        type: boolean
        default: false
      # Go-specific
      go_version:
        description: "Go version"
        required: false
        type: string
        default: "1.25"
      has_auth_dep:
        description: "Clone undercurrent-auth-go for replace directive"
        required: false
        type: boolean
        default: false
      build_target:
        description: "Go build target"
        required: false
        type: string
        default: "./cmd/server"
      # Python-specific
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      install_method:
        description: "pip (requirements.txt) or editable (pyproject.toml)"
        required: false
        type: string
        default: "pip"
      src_path:
        description: "Source path for linting"
        required: false
        type: string
        default: "src/"
      has_tests:
        description: "Run test suite (language-specific)"
        required: false
        type: boolean
        default: true
      # Node-specific
      node_version:
        description: "Node.js version"
        required: false
        type: string
        default: "20"
      build_command:
        description: "Node build command"
        required: false
        type: string
        default: "npm run build"

permissions:
  id-token: write
  contents: write
  pull-requests: read
  security-events: write

jobs:
  # ──────────────────────────────────────────────
  # 1. TEST — language-specific unit/integration tests
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- Go ---
      - name: Generate GitHub App token
        if: inputs.language == 'go' && inputs.has_auth_dep
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: UndercurrentSMB
          repositories: undercurrent-auth-go

      - name: Clone auth-go for replace directive
        if: inputs.language == 'go' && inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/UndercurrentSMB/undercurrent-auth-go.git \
            ${{ github.workspace }}/../undercurrent-auth-go

      - name: Set up Go
        if: inputs.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}

      - name: Go vet
        if: inputs.language == 'go'
        run: go vet ./...

      - name: Go test
        if: inputs.language == 'go'
        run: go test ./...

      - name: Go build
        if: inputs.language == 'go'
        run: go build -o /dev/null ${{ inputs.build_target }}

      # --- Python ---
      - name: Set up Python
        if: inputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install Python deps (pip)
        if: inputs.language == 'python' && inputs.install_method == 'pip'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest 2>/dev/null || true

      - name: Install Python deps (editable)
        if: inputs.language == 'python' && inputs.install_method == 'editable'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Python lint
        if: inputs.language == 'python'
        run: ruff check ${{ inputs.src_path }}
        continue-on-error: true

      - name: Python test
        if: inputs.language == 'python' && inputs.has_tests
        run: pytest tests/ -v --tb=short

      # --- Node ---
      - name: Set up Node.js
        if: inputs.language == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
          cache: "npm"

      - name: Node install
        if: inputs.language == 'node'
        run: npm ci

      - name: Node lint
        if: inputs.language == 'node'
        run: npm run lint 2>/dev/null || true

      - name: Node test
        if: inputs.language == 'node'
        run: npm test 2>/dev/null || true

      - name: Node build
        if: inputs.language == 'node'
        run: ${{ inputs.build_command }}

  # ──────────────────────────────────────────────
  # 1b. SECURITY — gitleaks + dependency scan
  # ──────────────────────────────────────────────
  security:
    uses: UndercurrentSMB/undercurrent-workflows/.github/workflows/security.yml@main
    with:
      language: ${{ inputs.language }}
      go_version: ${{ inputs.go_version }}
      python_version: ${{ inputs.python_version }}
      node_version: ${{ inputs.node_version }}
      has_auth_dep: ${{ inputs.has_auth_dep }}
    secrets: inherit

  # ──────────────────────────────────────────────
  # 2. BUILD — Docker image, tagged with git SHA
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    needs: [test, security]
    if: ${{ inputs.has_docker }}
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        if: inputs.has_auth_dep
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: UndercurrentSMB
          repositories: undercurrent-auth-go

      - name: Clone and stage auth-go for Docker build
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/UndercurrentSMB/undercurrent-auth-go.git \
            /tmp/undercurrent-auth-go
          mkdir -p .deps
          cp -r /tmp/undercurrent-auth-go .deps/undercurrent-auth-go

      - name: Compute image metadata
        id: meta
        run: |
          echo "image_ref=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-2' }}.amazonaws.com/${{ inputs.service_name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Compute image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "${{ steps.meta.outputs.image_ref }}"
            if [ "${{ github.event_name }}" != "pull_request" ]; then
              echo "${{ steps.ecr-login.outputs.registry }}/${{ inputs.service_name }}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  # ──────────────────────────────────────────────
  # 3. DEPLOY DEV — ArgoCD API: set tag → sync → verify
  # ──────────────────────────────────────────────
  deploy-dev:
    name: Deploy to Dev
    needs: docker
    if: ${{ inputs.has_docker && inputs.argocd_enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ARGOCD_SERVER: argocd-dev.undercurrentsmb.com
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch ArgoCD token
        run: |
          ARGOCD_AUTH_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id dev/undercurrentsmb/master-list \
            --query 'SecretString' --output text \
            --region ${{ vars.AWS_REGION }} | jq -r '.["ARGOCD-DEV-TOKEN"]')
          echo "::add-mask::$ARGOCD_AUTH_TOKEN"
          echo "ARGOCD_AUTH_TOKEN=$ARGOCD_AUTH_TOKEN" >> "$GITHUB_ENV"

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd && sudo mv argocd /usr/local/bin/

      - name: Set image tag and sync
        run: |
          argocd app set "${{ inputs.service_name }}" \
            -p "base-service.deployment.image.tag=${{ github.sha }}" \
            --grpc-web --insecure
          argocd app sync "${{ inputs.service_name }}" --grpc-web --insecure --prune
          argocd app wait "${{ inputs.service_name }}" --health --sync --timeout 300 --grpc-web --insecure

      - name: Verify deployment health
        run: |
          HEALTH=$(argocd app get "${{ inputs.service_name }}" -o json --grpc-web --insecure | jq -r '.status.health.status')
          if [ "$HEALTH" != "Healthy" ]; then
            echo "::error::Dev deployment unhealthy: $HEALTH"
            argocd app get "${{ inputs.service_name }}" --grpc-web --insecure
            exit 1
          fi
          echo "Dev deployment healthy"

  # ──────────────────────────────────────────────
  # 4. VERIFY — e2e tests against dev (optional)
  # ──────────────────────────────────────────────
  verify:
    name: Verify Dev Deployment
    needs: deploy-dev
    if: ${{ inputs.has_e2e && inputs.argocd_enabled }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run e2e tests
        env:
          BASE_URL: https://dev.undercurrentsmb.com
          API_URL: https://dev-api.undercurrentsmb.com
          CI: "true"
        run: npx playwright test tests/e2e/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  # ──────────────────────────────────────────────
  # 5. RELEASE — conventional commit → semver → GitHub Release
  #    Uses github.sha as the release target (the actual merge commit,
  #    not a bot commit). Fixes the SHA mismatch bug in the old flow.
  # ──────────────────────────────────────────────
  release:
    name: Release
    needs: [test, security, docker, deploy-dev, verify]
    # Run even when optional jobs (docker, deploy-dev, verify) are skipped.
    # Do NOT run if any required job failed. Skip on PRs — only release on merge.
    if: ${{ always() && !failure() && !cancelled() && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
      skip: ${{ steps.bump.outputs.skip }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
            LAST_TAG="v0.0.0"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null)
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_BREAKING=$(echo "$COMMITS" | grep -cE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE" || true)
          HAS_FEAT=$(echo "$COMMITS" | grep -cE "^feat" || true)
          HAS_PATCH=$(echo "$COMMITS" | grep -cE "^(fix|refactor|perf|chore|ci|build|test)" || true)

          if [ "$HAS_BREAKING" -gt 0 ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$HAS_FEAT" -gt 0 ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$HAS_PATCH" -gt 0 ]; then
            PATCH=$((PATCH + 1))
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Bumping to v${MAJOR}.${MINOR}.${PATCH}"

      - name: Generate changelog
        if: steps.bump.outputs.skip == 'false'
        id: changelog
        run: |
          RANGE="${{ steps.bump.outputs.range }}"
          {
            echo 'body<<CHANGELOG_EOF'

            FEATS=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^feat" | sed 's/^feat[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$FEATS" ]; then
              echo "## Features"
              echo "$FEATS"
              echo ""
            fi

            FIXES=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^fix" | sed 's/^fix[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$FIXES" ]; then
              echo "## Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            OTHER=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^(refactor|perf|chore|ci|build|test)" | sed 's/^[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$OTHER" ]; then
              echo "## Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.bump.outputs.skip == 'false'
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --target "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────
  # 6. RETAG — same image, new tag (:sha → :vX.Y.Z)
  #    No rebuild. Just an ECR manifest copy.
  # ──────────────────────────────────────────────
  retag:
    name: Retag Image
    needs: [release, docker]
    if: ${{ always() && !failure() && !cancelled() && inputs.has_docker && needs.release.outputs.skip == 'false' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Retag image with semver
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          SHA="${{ github.sha }}"

          echo "Retagging $SHA → $TAG"

          MANIFEST=$(aws ecr batch-get-image \
            --repository-name "${{ inputs.service_name }}" \
            --image-ids imageTag="$SHA" \
            --query 'images[0].imageManifest' \
            --output text \
            --region ${{ vars.AWS_REGION }})

          if [ "$MANIFEST" = "None" ] || [ -z "$MANIFEST" ]; then
            echo "::error::Image $SHA not found in ECR"
            exit 1
          fi

          aws ecr put-image \
            --repository-name "${{ inputs.service_name }}" \
            --image-tag "$TAG" \
            --image-manifest "$MANIFEST" \
            --region ${{ vars.AWS_REGION }} || echo "Tag may already exist"

          echo "Tagged $TAG"

  # ──────────────────────────────────────────────
  # 7. DEPLOY PROD — ArgoCD API: set semver tag → sync → verify
  # ──────────────────────────────────────────────
  deploy-prod:
    name: Deploy to Prod
    needs: [retag, release]
    if: ${{ always() && !failure() && !cancelled() && inputs.has_docker && inputs.argocd_enabled && needs.release.outputs.skip == 'false' && github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ARGOCD_SERVER: argocd.undercurrentsmb.com
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Fetch ArgoCD token
        run: |
          ARGOCD_AUTH_TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id prod/undercurrentsmb/master-list \
            --query 'SecretString' --output text \
            --region ${{ vars.AWS_REGION }} | jq -r '.["ARGOCD-PROD-TOKEN"]')
          echo "::add-mask::$ARGOCD_AUTH_TOKEN"
          echo "ARGOCD_AUTH_TOKEN=$ARGOCD_AUTH_TOKEN" >> "$GITHUB_ENV"

      - name: Install ArgoCD CLI
        run: |
          curl -sSL -o argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x argocd && sudo mv argocd /usr/local/bin/

      - name: Set image tag and sync
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          argocd app set "${{ inputs.service_name }}" \
            -p "base-service.deployment.image.tag=$TAG" \
            --grpc-web --insecure
          argocd app sync "${{ inputs.service_name }}" --grpc-web --insecure --prune
          argocd app wait "${{ inputs.service_name }}" --health --sync --timeout 300 --grpc-web --insecure

      - name: Verify deployment health
        run: |
          HEALTH=$(argocd app get "${{ inputs.service_name }}" -o json --grpc-web --insecure | jq -r '.status.health.status')
          if [ "$HEALTH" != "Healthy" ]; then
            echo "::error::Prod deployment unhealthy: $HEALTH"
            argocd app get "${{ inputs.service_name }}" --grpc-web --insecure
            exit 1
          fi
          echo "Prod deployment healthy"
