name: Python Service CI

on:
  workflow_call:
    inputs:
      dev_mode:
        description: "Skip security scans, Docker on PRs, and use single-arch builds to save CI minutes"
        required: false
        type: boolean
        default: false
      service_name:
        description: "Service name (e.g. undercurrent-ai)"
        required: true
        type: string
      python_version:
        description: "Python version"
        required: false
        type: string
        default: "3.12"
      has_docker:
        description: "Build and push Docker image on main push"
        required: false
        type: boolean
        default: false
      install_method:
        description: "pip (requirements.txt) or editable (pyproject.toml)"
        required: false
        type: string
        default: "pip"
      src_path:
        description: "Source path for linting (e.g. src/)"
        required: false
        type: string
        default: "src/"
      has_tests:
        description: "Run pytest"
        required: false
        type: boolean
        default: true
      argocd_enabled:
        description: "Update image tag in helm/values.yaml after build for ArgoCD"
        required: false
        type: boolean
        default: false
    outputs:
      image_tag:
        description: "Docker image tag (git SHA)"
        value: ${{ jobs.docker.outputs.image_tag }}
      image_ref:
        description: "Full ECR image reference"
        value: ${{ jobs.docker.outputs.image_ref }}

permissions:
  id-token: write
  contents: read
  pull-requests: read
  security-events: write

jobs:
  security:
    if: ${{ !inputs.dev_mode }}
    uses: UndercurrentSMB/undercurrent-workflows/.github/workflows/security.yml@v0
    with:
      language: python
      python_version: ${{ inputs.python_version }}
    secrets: inherit

  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Install dependencies (requirements.txt)
        if: inputs.install_method == 'pip'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest 2>/dev/null || true

      - name: Install dependencies (editable)
        if: inputs.install_method == 'editable'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check ${{ inputs.src_path }}
        continue-on-error: true

      - name: Test
        if: inputs.has_tests
        run: pytest tests/ -v --tb=short

  docker:
    name: Docker Build & Push
    if: ${{ inputs.has_docker && !(inputs.dev_mode && github.event_name == 'pull_request') }}
    needs: [test, security]
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ github.sha }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image metadata
        id: meta
        run: |
          echo "image_ref=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION || 'us-east-2' }}.amazonaws.com/${{ inputs.service_name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        if: ${{ !inputs.dev_mode }}
        uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ inputs.dev_mode && 'linux/arm64' || 'linux/amd64,linux/arm64' }}
          push: true
          tags: |
            ${{ steps.meta.outputs.image_ref }}
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && format('{0}/{1}:latest', steps.ecr-login.outputs.registry, inputs.service_name) || '' }}

  image-scan:
    name: Image Security Scan
    if: ${{ inputs.has_docker && !inputs.dev_mode }}
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ needs.docker.outputs.image_ref }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

  update-image-tag:
    name: Update Image Tag
    if: ${{ inputs.argocd_enabled && github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.docker.result == 'success' }}
    needs: [docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install yq
        uses: mikefarah/yq@master

      - name: Update image tag in values.yaml
        run: |
          yq -i '.["base-service"].deployment.image.tag = "${{ github.sha }}"' helm/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/values.yaml
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update image tag to ${{ github.sha }} [skip ci]"
          git push
