name: Semver Release

on:
  workflow_call:
    inputs:
      update_package_json:
        description: "Update package.json version on release"
        type: boolean
        default: false
      node_version:
        description: "Node.js version (only used when update_package_json is true)"
        type: string
        default: "20"
      floating_major_tag:
        description: "Maintain floating major version tag (e.g., v1 always points to latest v1.x.x)"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: bump')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          LAST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
            LAST_TAG="v0.0.0"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          MAJOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f1)
          MINOR=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f2)
          PATCH=$(echo "$LAST_TAG" | sed 's/^v//' | cut -d. -f3)

          COMMITS=$(git log "$RANGE" --pretty=format:"%s" 2>/dev/null)
          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HAS_BREAKING=$(echo "$COMMITS" | grep -cE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE" || true)
          HAS_FEAT=$(echo "$COMMITS" | grep -cE "^feat" || true)
          HAS_PATCH=$(echo "$COMMITS" | grep -cE "^(fix|refactor|perf|chore|ci|build|test)" || true)

          if [ "$HAS_BREAKING" -gt 0 ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "$HAS_FEAT" -gt 0 ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          elif [ "$HAS_PATCH" -gt 0 ]; then
            PATCH=$((PATCH + 1))
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "major=v$MAJOR" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "range=$RANGE" >> "$GITHUB_OUTPUT"
          echo "Bumping to v$NEW_VERSION"

      - name: Set up Node.js
        if: inputs.update_package_json && steps.bump.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}

      - name: Update package.json version
        if: inputs.update_package_json && steps.bump.outputs.skip == 'false'
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" = "${{ steps.bump.outputs.version }}" ]; then
            echo "package.json already at $CURRENT — skipping"
            exit 0
          fi
          npm version "${{ steps.bump.outputs.version }}" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git add package-lock.json 2>/dev/null || true
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Generate changelog
        if: steps.bump.outputs.skip == 'false'
        id: changelog
        run: |
          RANGE="${{ steps.bump.outputs.range }}"
          {
            echo 'body<<CHANGELOG_EOF'

            FEATS=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^feat" | sed 's/^feat[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$FEATS" ]; then
              echo "## Features"
              echo "$FEATS"
              echo ""
            fi

            FIXES=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^fix" | sed 's/^fix[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$FIXES" ]; then
              echo "## Bug Fixes"
              echo "$FIXES"
              echo ""
            fi

            OTHER=$(git log "$RANGE" --pretty=format:"%s" | grep -E "^(refactor|perf|chore|ci|build|test)" | sed 's/^[^:]*: //' | sed 's/^/- /' || true)
            if [ -n "$OTHER" ]; then
              echo "## Other Changes"
              echo "$OTHER"
              echo ""
            fi

            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.bump.outputs.skip == 'false'
        run: |
          gh release create "${{ steps.bump.outputs.tag }}" \
            --title "${{ steps.bump.outputs.tag }}" \
            --notes "${{ steps.changelog.outputs.body }}" \
            --target main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update floating major version tag
        if: inputs.floating_major_tag && steps.bump.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "${{ steps.bump.outputs.major }}" HEAD
          git push origin "${{ steps.bump.outputs.major }}" --force
