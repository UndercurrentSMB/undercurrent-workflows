# go-ci.yml — PR-only Go CI
#
# Runs: go vet → go test → go build
# No Docker. No deploy. Fast feedback on PRs.

name: Go CI

on:
  workflow_call:
    inputs:
      go_version:
        description: "Go version"
        required: false
        type: string
        default: "1.25"
      has_auth_dep:
        description: "Clone auth-go for replace directive"
        required: false
        type: boolean
        default: false
      has_rabbit_dep:
        description: "Clone shared-go-rabbit for replace directive"
        required: false
        type: boolean
        default: false
      build_target:
        description: "Go build target (e.g. ./cmd/server, ./...)"
        required: false
        type: string
        default: "./cmd/server"
      lint_raw_amqp:
        description: "Fail if Go files outside internal/rabbit/ call raw AMQP publish/consume (opt-in)"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App token
        if: inputs.has_auth_dep || inputs.has_rabbit_dep
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: Respondyr
          repositories: auth-go,shared-go-rabbit

      - name: Clone auth-go for replace directive
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Respondyr/auth-go.git \
            ${{ github.workspace }}/../auth-go

      - name: Clone shared-go-rabbit for replace directive
        if: inputs.has_rabbit_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/Respondyr/shared-go-rabbit.git \
            ${{ github.workspace }}/../shared-go-rabbit

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /dev/null ${{ inputs.build_target }}

      - name: Secret scan (gitleaks)
        # Catches accidentally-committed credentials (.env, keys, tokens). Uses
        # the shared allowlist at github.com/Respondyr/workflows/.gitleaks.toml
        # which excludes obvious test fixtures (test_secret, *.example, etc.).
        # P0.3 Sub-track 4.3 — prevention against re-introducing the secrets
        # we already rotated.
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml
          # `with: config-path:` is read by gitleaks-action only when present at
          # the calling repo root. If the calling repo has no .gitleaks.toml,
          # gitleaks falls back to its built-in default ruleset, which is fine.

      - name: Lint raw AMQP calls
        if: inputs.lint_raw_amqp
        run: |
          # Fail if any Go file outside internal/rabbit/ calls raw AMQP
          # publish or consume methods directly. Services should use
          # shared-go-rabbit's PublishJSON and HandleDelivery instead.
          PUBLISH_HITS=$(grep -rn --include='*.go' '\.PublishWithContext(' . \
            --exclude-dir=vendor --exclude-dir=.git \
            | grep -v 'internal/rabbit/' \
            || true)

          CONSUME_HITS=$(grep -rn --include='*.go' 'ch\.Consume(' . \
            --exclude-dir=vendor --exclude-dir=.git \
            | grep -v 'internal/rabbit/' \
            || true)

          HITS="${PUBLISH_HITS}${CONSUME_HITS}"
          if [ -n "$HITS" ]; then
            echo "::error::Raw AMQP calls found — use shared-go-rabbit (PublishJSON / HandleDelivery) instead:"
            echo "$PUBLISH_HITS"
            echo "$CONSUME_HITS"
            exit 1
          fi
          echo "No raw AMQP calls found outside internal/rabbit/"
