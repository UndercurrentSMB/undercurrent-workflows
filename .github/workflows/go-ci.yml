# go-ci.yml — PR-only Go CI
#
# Runs: go vet → go test → go build
# No Docker. No deploy. Fast feedback on PRs.

name: Go CI

on:
  workflow_call:
    inputs:
      go_version:
        description: "Go version"
        required: false
        type: string
        default: "1.25"
      has_auth_dep:
        description: "Clone undercurrent-auth-go for replace directive"
        required: false
        type: boolean
        default: false
      build_target:
        description: "Go build target (e.g. ./cmd/server, ./...)"
        required: false
        type: string
        default: "./cmd/server"

permissions:
  contents: read

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        if: inputs.has_auth_dep
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: UndercurrentSMB
          repositories: undercurrent-auth-go

      - name: Clone auth-go for replace directive
        if: inputs.has_auth_dep
        run: |
          git clone --depth 1 \
            https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/UndercurrentSMB/undercurrent-auth-go.git \
            ${{ github.workspace }}/../undercurrent-auth-go

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go_version }}
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o /dev/null ${{ inputs.build_target }}
